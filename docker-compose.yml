version: '3.8'

services:
  # MySQL数据库
  db:
    image: mysql:8.0
    container_name: testrunner_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - testrunner_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django后端
  backend:
    build:
      context: ./TestRunner_Django
      dockerfile: Dockerfile
    container_name: testrunner_backend
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=3306
      - CELERY_BROKER_URL=sqla+sqlite:///celery.sqlite
      - CELERY_RESULT_BACKEND=django-db
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./TestRunner_Django:/app
      - backend_logs:/app/logs
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - testrunner_network
    entrypoint: ["/bin/bash", "/app/docker-entrypoint.sh"]
    command: ["gunicorn", "TestRunner.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]

  # Celery Worker - 异步任务执行
  celery_worker:
    build:
      context: ./TestRunner_Django
      dockerfile: Dockerfile
    container_name: testrunner_celery_worker
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=3306
      - CELERY_BROKER_URL=sqla+sqlite:///celery.sqlite
      - CELERY_RESULT_BACKEND=django-db
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./TestRunner_Django:/app
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - testrunner_network
    command: ["celery", "-A", "TestRunner", "worker", "-l", "info", "--concurrency=4"]

  # Celery Beat - 定时任务调度
  celery_beat:
    build:
      context: ./TestRunner_Django
      dockerfile: Dockerfile
    container_name: testrunner_celery_beat
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=3306
      - CELERY_BROKER_URL=sqla+sqlite:///celery.sqlite
      - CELERY_RESULT_BACKEND=django-db
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./TestRunner_Django:/app
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - testrunner_network
    command: ["celery", "-A", "TestRunner", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]

  # Vue前端
  frontend:
    build:
      context: ./TestRunner_Vue
      dockerfile: Dockerfile
    container_name: testrunner_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - testrunner_network

networks:
  testrunner_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local
  static_files:
    driver: local