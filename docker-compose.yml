version: '3.8'

# TestRunner 生产环境部署文件 (使用预构建镜像)
# 使用方法: docker-compose up -d

services:
  # MySQL数据库
  db:
    image: mysql:8.0
    container_name: testrunner_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-testrunner123}
      MYSQL_DATABASE: ${DB_NAME:-testrunner}
      MYSQL_USER: ${DB_USER:-testrunner}
      MYSQL_PASSWORD: ${DB_PASSWORD:-testrunner123}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - testrunner_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_PASSWORD:-testrunner123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django后端
  backend:
    image: ghcr.io/lucky-testrunner/testrunner-backend:latest
    container_name: testrunner_backend
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-default-secret-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${DB_NAME:-testrunner}
      - DB_USER=${DB_USER:-testrunner}
      - DB_PASSWORD=${DB_PASSWORD:-testrunner123}
      - DB_HOST=db
      - DB_PORT=3306
      - CELERY_BROKER_URL=sqla+sqlite:///celery.sqlite
      - CELERY_RESULT_BACKEND=django-db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_logs:/app/logs
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - testrunner_network

  # Celery Worker - 异步任务执行
  celery_worker:
    image: ghcr.io/lucky-testrunner/testrunner-backend:latest
    container_name: testrunner_celery_worker
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-default-secret-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${DB_NAME:-testrunner}
      - DB_USER=${DB_USER:-testrunner}
      - DB_PASSWORD=${DB_PASSWORD:-testrunner123}
      - DB_HOST=db
      - DB_PORT=3306
      - CELERY_BROKER_URL=sqla+sqlite:///celery.sqlite
      - CELERY_RESULT_BACKEND=django-db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - testrunner_network
    command: ["celery", "-A", "TestRunner", "worker", "-l", "info", "--concurrency=4"]

  # Celery Beat - 定时任务调度
  celery_beat:
    image: ghcr.io/lucky-testrunner/testrunner-backend:latest
    container_name: testrunner_celery_beat
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-default-secret-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=${DB_NAME:-testrunner}
      - DB_USER=${DB_USER:-testrunner}
      - DB_PASSWORD=${DB_PASSWORD:-testrunner123}
      - DB_HOST=db
      - DB_PORT=3306
      - CELERY_BROKER_URL=sqla+sqlite:///celery.sqlite
      - CELERY_RESULT_BACKEND=django-db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - testrunner_network
    command: ["celery", "-A", "TestRunner", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]

  # Vue前端
  frontend:
    image: ghcr.io/lucky-testrunner/testrunner-frontend:latest
    container_name: testrunner_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - testrunner_network

networks:
  testrunner_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local
  static_files:
    driver: local